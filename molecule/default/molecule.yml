---
driver:
  name: docker

platforms:
  - name: vector-debian
    image: geerlingguy/docker-debian11-ansible:latest
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    command: /sbin/init
    environment:
      container: docker

  - name: vector-almalinux
    image: almalinux:8
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    command: /usr/sbin/init
    environment:
      container: docker

provisioner:
  name: ansible
  config_options:
    defaults:
      pipelining: true
  env:
    ANSIBLE_PYTHON_INTERPRETER: auto_silent
    ANSIBLE_ALLOW_BROKEN_CONDITIONALS: "True"

verifier:
  name: ansible
